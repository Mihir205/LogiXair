## EMQX 5.x hardened config — LogiXair MQTT-only telemetry plane.
## This is the AFTER (protected) config. For BEFORE/AFTER demos use
## emqx.vulnerable.conf in the volume mount instead.

node {
  name = "emqx@127.0.0.1"
  cookie = "logixair-cookie-change-me"
  data_dir = "data"
}

cluster {
  name = logixair_cluster
  discovery_strategy = manual
}

## ─── Authentication ────────────────────────────────────────────────
## M1 — anonymous CONNECT blocked. Every client MUST present user+pass.
authentication = [
  {
    mechanism = password_based
    backend   = built_in_database
    user_id_type = username
  }
]

## ─── Authorization (ACL) ───────────────────────────────────────────
## M3, M4, M10 — per-client topic restrictions in etc/acl.conf.
## "deny" is the default for unmatched topics.
authorization {
  no_match            = deny
  deny_action         = ignore
  cache  { enable = true, max_size = 32, ttl = 1m }
  sources = [
    { type = file, path = "etc/acl.conf", enable = true }
  ]
}

## ─── Listeners ─────────────────────────────────────────────────────
## M7  — oversized payload DoS:  max_packet_size 2 KB
## M8  — CONNECT flood DoS:      max_connections + max_conn_rate
## M5  — retained-message poisoning off
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024
  max_conn_rate   = 50          ## 50 new CONNECTs/sec/listener
}
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 4096
  max_conn_rate   = 100
  ssl_options {
    keyfile  = "etc/certs/server.key"
    certfile = "etc/certs/server.crt"
    cacertfile = "etc/certs/ca.crt"
    verify   = verify_none      ## set to verify_peer for mTLS in prod
    versions = ["tlsv1.3", "tlsv1.2"]
  }
}

mqtt {
  max_packet_size      = 2KB     ## M7 — DoS cap (telemetry is ~300 B)
  max_clientid_len     = 64
  max_topic_levels     = 8
  max_qos_allowed      = 1       ## reject QoS 2 (M14 amplification)
  retain_available     = false   ## M5 — kill retained-message poisoning
  wildcard_subscription = true   ## allowed for backend role only (ACL gated)
  shared_subscription  = false
  keepalive_multiplier = 1.25
  await_rel_timeout    = 5s
  max_awaiting_rel     = 100
}

## ─── Will message (LWT) ────────────────────────────────────────────
## M10 — LWT abuse: ACL denies LWT publish to telemetry topics. Stations
## may set LWT only on  clients/${clientid}/status  (handled in acl.conf).

## ─── Logging ───────────────────────────────────────────────────────
log {
  console_handler {
    enable = true
    level  = info
    formatter = text
  }
  file_handlers.default {
    enable = true
    level  = warning
    path   = "log/emqx.log"
    rotation_count = 10
    rotation_size  = 50MB
  }
  ## Audit log — every authn/authz decision. Subscribe from FastAPI to feed
  ## the Firestore  security_events  collection for the Live Alerts feed.
  file_handlers.audit {
    enable = true
    level  = notice
    path   = "log/emqx-audit.log"
    formatter = json
  }
}

## ─── Dashboard (admin UI on 18083) ─────────────────────────────────
dashboard {
  listeners.http { bind = 18083 }
  default_username = "admin"
  default_password = "logixair-change-me-on-first-login"
}
