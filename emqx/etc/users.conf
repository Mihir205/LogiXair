## Built-in MQTT users for the LogiXair demo.
##
## Format (EMQX 5.x):  username:bcrypt_password
##
## DEMO passwords below. Rotate before any non-local deployment — load via
##   docker exec logixair-emqx emqx ctl users add <user> <password>
## or via the dashboard at http://localhost:18083  (admin/logixair-change-me-on-first-login).
##
## Roles enforced by acl.conf:
##   logixair-backend  → read every station/gateway topic, publish nothing
##   STATION-DEMO01    → publish ONLY to stations/STATION-DEMO01/*
##   STATION-DEMO02    → publish ONLY to stations/STATION-DEMO02/*
##   GATEWAY-DEMO01    → publish to gateways/GATEWAY-DEMO01/* + relay station topics

logixair-backend:$2b$12$REPLACE_WITH_BCRYPT_HASH_FOR_backend
STATION-DEMO01:$2b$12$REPLACE_WITH_BCRYPT_HASH_FOR_station01
STATION-DEMO02:$2b$12$REPLACE_WITH_BCRYPT_HASH_FOR_station02
GATEWAY-DEMO01:$2b$12$REPLACE_WITH_BCRYPT_HASH_FOR_gateway01
