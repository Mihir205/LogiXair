## EMQX VULNERABLE config — for BEFORE-screenshot demos only.
## DO NOT USE IN PRODUCTION. Swap this file in via the docker-compose
## volume mount when capturing the "before" screenshots, then swap back
## to emqx.conf for the "after" run.
##
## What is intentionally broken here:
##   - allow_anonymous = true                        (M1)
##   - no rate-limit on CONNECT                      (M2, M8)
##   - retain_available = true                       (M5)
##   - max_packet_size = 1 MB (large)                (M7)
##   - authorization no_match = allow                (M3, M4, M10)

node      { name = "emqx@127.0.0.1", cookie = "demo-cookie", data_dir = "data" }
cluster   { name = logixair_cluster, discovery_strategy = manual }

## Anonymous CONNECT allowed (vulnerable to M1)
authentication = []

## Allow-all ACL (vulnerable to M3, M4, M10)
authorization {
  no_match    = allow
  deny_action = ignore
  sources     = []
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 100000
  ## no max_conn_rate -> CONNECT flood unmitigated
}

mqtt {
  max_packet_size       = 1MB
  max_qos_allowed       = 2
  retain_available      = true
  wildcard_subscription = true
  shared_subscription   = true
}

log { console_handler { enable = true, level = info } }
dashboard {
  listeners.http { bind = 18083 }
  default_username = "admin"
  default_password = "public"
}
