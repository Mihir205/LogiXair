%% LogiXair MQTT topic ACL — protects against M3, M4, M10.
%%
%% Rule format (EMQX 5.x file ACL):
%%   {allow|deny, who, action, topics}.
%%
%% Resolution order: top-to-bottom. First match wins. Default = deny (from
%% emqx.conf  authorization.no_match = deny).

%% ─── BACKEND ROLE ─────────────────────────────────────────────────
%% The FastAPI subscriber needs full read on every station/gateway topic
%% so it can ingest telemetry into Firestore. NO publish rights — it
%% never injects data; it only reads.
{allow, {user, "logixair-backend"}, subscribe,
  ["stations/+/telemetry",
   "stations/+/status",
   "gateways/+/status",
   "$SYS/brokers/+/stats"]}.

{deny,  {user, "logixair-backend"}, publish,  ["#"]}.

%% ─── STATION ROLE ─────────────────────────────────────────────────
%% Each weather station logs in as username = its clientid. EMQX exposes
%% the connecting clientid as ${clientid} in the ACL rule. So a station
%% with clientid=STATION-A07 can ONLY publish under stations/STATION-A07/...
%% That fully closes M3 (cross-station publish).

%% Stations may publish telemetry + status to their OWN namespace only.
{allow, {clientid, {re, "^STATION-[A-Z0-9-]+$"}}, publish,
  ["stations/${clientid}/telemetry",
   "stations/${clientid}/status"]}.

%% Stations may NOT subscribe to anything — they are publish-only sensors.
%% This closes M4 (wildcard subscribe exfiltration).
{deny,  {clientid, {re, "^STATION-[A-Z0-9-]+$"}}, subscribe, ["#"]}.

%% Stations may set LWT (Last Will) ONLY on their own /status topic.
%% Any LWT pointing at /telemetry is rejected — closes M10 (LWT abuse).
%% (LWT topics are checked against publish ACL at CONNECT time in EMQX 5.)

%% ─── GATEWAY ROLE ─────────────────────────────────────────────────
%% Multi-station gateways (A7672S) publish their own status + relay
%% station telemetry for the stations they front.
{allow, {clientid, {re, "^GATEWAY-[A-Z0-9-]+$"}}, publish,
  ["gateways/${clientid}/status",
   "stations/+/telemetry",
   "stations/+/status"]}.

{deny,  {clientid, {re, "^GATEWAY-[A-Z0-9-]+$"}}, subscribe, ["#"]}.

%% ─── CATCH-ALL DENY ───────────────────────────────────────────────
%% Anything not matched above is denied via authorization.no_match.
%% This line is documentation; emqx.conf already enforces it.
{deny, all, all, ["#"]}.
